{% extends "base.html" %}

{% block title %}Gallery - GHL Infratech{% endblock %}

{% block content %}

<div class="page-banner" style="background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('{{ url_for('static', filename='images/p1.jpg') }}') center/cover; padding: 220px 0; text-align: center; color: white; margin-top: -20px;">
    <h1 style="font-size: 48px; margin: 0; font-weight: 700;">Project Gallery</h1>
    <p style="font-size: 16px; margin-top: 10px; color: #ddd;">Home / Gallery</p>
</div>

<section class="gallery-section" style="padding: 80px 20px; max-width: 1200px; margin: auto;">
    
    <div class="gallery-grid">
        
        <!-- IMAGE CARDS -->
        {% for i in range(1,17) %}
        <div class="gallery-card" data-aos="fade-up">
            <img src="{{ url_for('static', filename='images/' ~ i ~ '.jpeg') }}">
        </div>
        {% endfor %}

    </div>
</section>

<!-- MODAL -->
<div id="imageModal" class="modal">
    <span class="close-modal">×</span>
    <img class="modal-content" id="modalImage">
</div>

<style>

/* GRID */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
}

/* CARD */
.gallery-card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    transition: 0.3s ease;
}

/* IMAGE */
.gallery-card img {
    width: 100%;
    height: 230px;
    object-fit: cover;
    display: block;
    cursor: pointer;
}

/* HOVER */
.gallery-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.2);
}

/* MODAL */
.modal {
    display: none; 
    position: fixed; 
    z-index: 9999; 
    padding-top: 100px; 
    left: 0;
    top: 0;
    width: 100%; 
    height: 100%; 
    background-color: rgba(0,0,0,0.9); 
}

.modal-content {
    margin: auto;
    display: block;
    max-width: 90%;
    max-height: 80vh;
    border-radius: 8px;
}

.close-modal {
    position: absolute;
    top: 30px;
    right: 40px;
    color: #fff;
    font-size: 50px;
    cursor: pointer;
}

</style>

{% endblock %}

{% block scripts %}
<script>
    var modal = document.getElementById("imageModal");
    var modalImg = document.getElementById("modalImage");
    var images = document.querySelectorAll(".gallery-card img");

    images.forEach(function(img) {
        img.onclick = function(){
            modal.style.display = "block";
            modalImg.src = this.src;
        }
    });

    document.querySelector(".close-modal").onclick = function() {
        modal.style.display = "none";
    }

    modal.onclick = function(e) {
        if (e.target !== modalImg) {
            modal.style.display = "none";
        }
    }
</script>
{% endblock %}
